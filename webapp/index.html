<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MER BENCH · 纹章图纸台</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23e11d33' stroke-width='1.7'%3E%3Crect width='24' height='24' fill='%230a0d12'/%3E%3Ccircle cx='12' cy='12' r='8.5'/%3E%3Cpath d='M12 3.5v17M3.5 12h17' stroke='%2357c8d6'/%3E%3C/svg%3E">

<style>
  :root{
    --void:#0a0d12; --panel:#10151d; --panel2:#0d1219;
    --line:#1d2733; --line-hi:#2b3a4a;
    --cyan:#57c8d6; --cyan-dim:#2d6b74;
    --scarlet:#e11d33; --scarlet-dim:#b3162a;
    --ink:#eaf0f6; --muted:#7c8ba0; --muted2:#566579;
    --grid:rgba(87,200,214,.045);
    --disp:"Bahnschrift","DIN Alternate","Microsoft YaHei UI","Segoe UI",system-ui,sans-serif;
    --mono:"Cascadia Mono","Consolas",ui-monospace,monospace;
    --body:"Segoe UI","Microsoft YaHei UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;background:var(--void);color:var(--ink);font-family:var(--body);
    font-size:14px;line-height:1.55;
    background-image:linear-gradient(var(--grid) 1px,transparent 1px),
                     linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:26px 26px;
  }
  .eyebrow{font-family:var(--disp);text-transform:uppercase;letter-spacing:.18em;
    font-size:11px;font-weight:600;color:var(--cyan)}
  .mono{font-family:var(--mono)}

  /* ---------- title bar ---------- */
  header{display:flex;align-items:center;gap:18px;padding:14px 22px;
    border-bottom:1px solid var(--line);background:linear-gradient(180deg,#0d131b,#0a0e14)}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .glyph{width:26px;height:26px;flex:none;color:var(--scarlet)}
  .brand h1{font-family:var(--disp);font-size:19px;font-weight:700;letter-spacing:.12em;
    margin:0;text-transform:uppercase;white-space:nowrap}
  .brand .tag{color:var(--muted);font-size:12.5px;border-left:1px solid var(--line-hi);
    padding-left:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  header .spacer{flex:1}
  .status{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11.5px;
    color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .status .dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);
    box-shadow:0 0 0 3px rgba(87,200,214,.14)}
  .status[data-s="work"] .dot{background:var(--scarlet);box-shadow:0 0 0 3px rgba(225,29,51,.16);
    animation:pulse 1s ease-in-out infinite}
  .status[data-s="err"] .dot{background:var(--scarlet)}
  @keyframes pulse{50%{opacity:.35}}
  .lang{display:flex;border:1px solid var(--line-hi);border-radius:6px;overflow:hidden;font-family:var(--disp)}
  .lang button{background:transparent;border:0;color:var(--muted);padding:5px 11px;cursor:pointer;
    font-size:12px;font-weight:600;letter-spacing:.06em}
  .lang button.on{background:var(--cyan);color:#06222a}

  /* ---------- shell ---------- */
  .shell{display:grid;grid-template-columns:396px 1fr;min-height:calc(100vh - 57px)}
  .deck{border-right:1px solid var(--line);padding:8px 0 26px;overflow:auto}
  .stage{padding:26px;display:flex;flex-direction:column;align-items:center;gap:18px}

  /* ---------- deck groups ---------- */
  .group{border-bottom:1px solid var(--line);padding:16px 22px}
  .group:last-of-type{border-bottom:0}
  .ghead{display:flex;align-items:baseline;gap:10px;margin-bottom:14px}
  .gnum{font-family:var(--mono);font-size:11px;color:var(--scarlet);letter-spacing:.05em}
  .gdesc{color:var(--muted2);font-size:11px;margin:-8px 0 13px;font-family:var(--mono)}
  .field{margin-bottom:13px}
  .field:last-child{margin-bottom:0}
  label.lbl{display:flex;justify-content:space-between;align-items:baseline;
    font-size:11.5px;color:var(--muted);margin-bottom:6px;font-family:var(--disp);
    text-transform:uppercase;letter-spacing:.09em}
  label.lbl .v{font-family:var(--mono);color:var(--cyan);text-transform:none;letter-spacing:0}
  input[type=text],input[type=number],select{width:100%;background:var(--panel2);
    border:1px solid var(--line);color:var(--ink);border-radius:6px;padding:8px 10px;
    font-size:13px;font-family:var(--mono)}
  input[type=text]:focus,input[type=number]:focus,select:focus{outline:0;border-color:var(--cyan-dim);
    box-shadow:0 0 0 3px rgba(87,200,214,.1)}
  .hint{color:var(--muted2);font-size:11px;margin-top:5px;line-height:1.45}
  .row{display:flex;gap:10px}.row>*{flex:1;min-width:0}

  /* segmented instrument switch */
  .seg{display:flex;background:var(--panel2);border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .seg button{flex:1;background:transparent;border:0;color:var(--muted);padding:8px 6px;cursor:pointer;
    font-size:12px;font-family:var(--disp);letter-spacing:.04em;transition:background .12s,color .12s}
  .seg button:hover{color:var(--ink)}
  .seg button.on{background:var(--cyan);color:#06222a;font-weight:600}

  /* range as instrument slider */
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:26px;background:transparent;cursor:pointer}
  input[type=range]::-webkit-slider-runnable-track{height:2px;background:var(--line-hi)}
  input[type=range]::-moz-range-track{height:2px;background:var(--line-hi)}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:4px;height:18px;background:var(--cyan);
    margin-top:-8px;border-radius:1px;box-shadow:0 0 0 4px rgba(87,200,214,.12)}
  input[type=range]::-moz-range-thumb{width:4px;height:18px;background:var(--cyan);border:0;border-radius:1px}
  input[type=range]:focus{outline:0}
  input[type=range]:focus::-webkit-slider-thumb{box-shadow:0 0 0 4px rgba(87,200,214,.28)}

  .swatchrow{display:flex;gap:9px;align-items:center}
  input[type=color]{width:42px;height:36px;padding:0;border:1px solid var(--line);border-radius:6px;
    background:var(--panel2);cursor:pointer}
  input[type=checkbox]{accent-color:var(--cyan);width:15px;height:15px;vertical-align:-2px;margin-right:6px}

  /* dropzone */
  .drop{border:1.5px dashed var(--line-hi);border-radius:8px;padding:20px 14px;text-align:center;
    color:var(--muted);cursor:pointer;background:var(--panel2);transition:border-color .15s,color .15s}
  .drop:hover,.drop.hover{border-color:var(--cyan-dim);color:var(--ink)}
  .drop .dtxt{font-family:var(--mono);font-size:12px}
  .drop img{max-width:100%;max-height:150px;border-radius:5px;margin-top:10px;
    filter:grayscale(.15) contrast(1.05)}

  details{border:1px solid var(--line);border-radius:8px;margin:2px 22px 0;background:var(--panel2)}
  details>summary{cursor:pointer;padding:11px 14px;font-family:var(--disp);text-transform:uppercase;
    letter-spacing:.09em;font-size:11.5px;color:var(--muted);list-style:none}
  details>summary::-webkit-details-marker{display:none}
  details>summary::before{content:"+";color:var(--cyan);margin-right:8px;font-family:var(--mono)}
  details[open]>summary{color:var(--ink);border-bottom:1px solid var(--line)}
  details[open]>summary::before{content:"–"}
  .details-body{padding:14px}

  /* primary action */
  .go-wrap{padding:20px 22px 4px}
  .go{width:100%;background:var(--scarlet);border:1px solid var(--scarlet);color:#fff;
    font-family:var(--disp);font-weight:700;font-size:15px;letter-spacing:.1em;text-transform:uppercase;
    padding:13px;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
    transition:transform .08s,background .15s,box-shadow .15s}
  .go:hover:not(:disabled){background:var(--scarlet-dim);box-shadow:0 0 26px rgba(225,29,51,.28)}
  .go:active:not(:disabled){transform:translateY(1px)}
  .go:disabled{background:transparent;border-color:var(--line-hi);color:var(--muted2);cursor:not-allowed}
  .go .arrow{transition:transform .15s}
  .go:hover:not(:disabled) .arrow{transform:translateX(3px)}
  .go-hint{color:var(--muted2);font-size:11px;margin-top:9px;font-family:var(--mono);text-align:center}

  /* ---------- viewport ---------- */
  .frame{position:relative;width:100%;max-width:660px;aspect-ratio:1/1;background:#000;
    border:1px solid var(--line-hi);
    background-image:linear-gradient(var(--grid) 1px,transparent 1px),
                     linear-gradient(90deg,var(--grid) 1px,transparent 1px);
    background-size:26px 26px;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .frame::before,.frame::after,.frame .reg{pointer-events:none}
  /* registration L-marks */
  .reg{position:absolute;width:16px;height:16px;border:1.5px solid var(--cyan)}
  .reg.tl{top:9px;left:9px;border-right:0;border-bottom:0}
  .reg.tr{top:9px;right:9px;border-left:0;border-bottom:0}
  .reg.bl{bottom:9px;left:9px;border-right:0;border-top:0}
  .reg.br{bottom:9px;right:9px;border-left:0;border-top:0}
  /* center crosshair (empty state) */
  .frame.empty::before{content:"";position:absolute;width:34px;height:1px;background:var(--cyan-dim);opacity:.6}
  .frame.empty::after{content:"";position:absolute;width:1px;height:34px;background:var(--cyan-dim);opacity:.6}
  .frame img{width:100%;height:100%;object-fit:contain;display:block}
  .frame.reveal img{animation:sweep .6s ease-out}
  @keyframes sweep{from{clip-path:inset(0 0 100% 0)}to{clip-path:inset(0 0 0 0)}}
  .scanline{position:absolute;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0}
  .frame.reveal .scanline{animation:scan .6s ease-out}
  @keyframes scan{0%{top:0;opacity:.9}100%{top:100%;opacity:0}}
  .empty-note{position:absolute;bottom:26px;left:0;right:0;text-align:center;color:var(--muted2);
    font-family:var(--mono);font-size:11px;letter-spacing:.04em}

  /* readout strip */
  .readout{width:100%;max-width:660px;border:1px solid var(--line);background:var(--panel);border-radius:8px}
  .rt-top{display:flex;align-items:stretch;border-bottom:1px solid var(--line)}
  .rt-count{padding:16px 20px;border-right:1px solid var(--line);min-width:190px}
  .rt-count b{font-family:var(--disp);font-size:44px;font-weight:700;line-height:.95;color:var(--scarlet);
    font-variant-numeric:tabular-nums;display:block}
  .rt-count span{font-family:var(--mono);color:var(--muted);font-size:10.5px;letter-spacing:.04em;
    display:block;margin-top:6px}
  .rt-meta{padding:16px 20px;flex:1;display:flex;flex-direction:column;justify-content:center;gap:7px;min-width:0}
  .rt-meta .name{font-family:var(--disp);font-size:17px;letter-spacing:.05em;color:var(--ink);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rt-meta .name small{color:var(--muted);font-size:10px;display:block;letter-spacing:.06em;text-transform:uppercase}
  .ngon{font-family:var(--mono);font-size:11px;color:var(--muted);line-height:1.5;word-break:break-word}
  .rt-bot{display:flex;align-items:center;gap:16px;padding:14px 20px;flex-wrap:wrap}
  .dl{display:inline-flex;align-items:center;gap:8px;background:var(--cyan);color:#06222a;text-decoration:none;
    padding:9px 16px;border-radius:6px;font-family:var(--disp);font-weight:600;letter-spacing:.05em;font-size:13px;
    text-transform:uppercase}
  .dl:hover{filter:brightness(1.08)}
  .deploy{color:var(--muted2);font-family:var(--mono);font-size:11px;flex:1;min-width:180px}

  .spinner{width:30px;height:30px;border:2px solid var(--line-hi);border-top-color:var(--cyan);
    border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err{width:100%;max-width:660px;background:#1a0d10;border:1px solid var(--scarlet-dim);color:#ffb4ad;
    border-radius:8px;padding:14px;font-family:var(--mono);font-size:12px;white-space:pre-wrap;line-height:1.5}
  .err b{color:var(--scarlet);font-family:var(--disp);letter-spacing:.08em;text-transform:uppercase;
    display:block;margin-bottom:6px}

  @media(prefers-reduced-motion:reduce){*{animation:none!important}}
  @media(max-width:860px){
    .shell{grid-template-columns:1fr}
    .deck{border-right:0;border-bottom:1px solid var(--line)}
    .brand .tag{display:none}
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <svg class="glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <circle cx="12" cy="12" r="9.2"/><path d="M12 3v18M3 12h18"/><path d="M12 12l6-3.5M12 12l-6-3.5M12 12v7" stroke="var(--cyan)"/>
    </svg>
    <h1>MER Bench</h1>
    <span class="tag" data-i18n="tag"></span>
  </div>
  <div class="spacer"></div>
  <div class="status" id="status" data-s="idle"><span class="dot"></span><span data-i18n="st_ready" id="statusText"></span></div>
  <div class="lang" id="lang">
    <button data-l="zh" class="on">中文</button>
    <button data-l="en">EN</button>
  </div>
</header>

<div class="shell">
  <!-- ============ CONTROL DECK ============ -->
  <div class="deck">
    <div class="group">
      <div class="ghead"><span class="gnum">01</span><span class="eyebrow" data-i18n="g_source"></span></div>
      <div class="field">
        <div id="drop" class="drop" tabindex="0" role="button" aria-label="upload image">
          <div class="dtxt" id="dropText" data-i18n="drop"></div>
          <img id="srcPreview" hidden alt="">
        </div>
        <input id="file" type="file" accept="image/*" hidden>
      </div>
      <div class="field">
        <label class="lbl" data-i18n="name"></label>
        <input id="name" type="text" data-i18n-ph="name_ph">
      </div>
    </div>

    <div class="group">
      <div class="ghead"><span class="gnum">02</span><span class="eyebrow" data-i18n="g_trace"></span></div>
      <div class="gdesc" data-i18n="trace_desc"></div>
      <div class="field">
        <div class="seg" id="fgSeg">
          <button data-v="light" class="on" data-i18n="light"></button>
          <button data-v="dark" data-i18n="dark"></button>
        </div>
      </div>
      <div class="field">
        <label class="lbl"><span data-i18n="threshold"></span><span class="v" id="thrVal">128</span></label>
        <input id="threshold" type="range" min="0" max="255" value="128">
      </div>
    </div>

    <div class="group">
      <div class="ghead"><span class="gnum">03</span><span class="eyebrow" data-i18n="g_fill"></span></div>
      <div class="field">
        <div class="seg" id="fillSeg">
          <button data-v="ngon" class="on" data-i18n="ngon"></button>
          <button data-v="triangle" data-i18n="triangle"></button>
        </div>
      </div>
      <div class="field">
        <label class="lbl"><span data-i18n="detail"></span><span class="v"><span id="simVal">1.5</span> px</span></label>
        <input id="simplify" type="range" min="0.5" max="8" step="0.5" value="1.5">
        <div class="hint" data-i18n="detail_hint"></div>
      </div>
    </div>

    <div class="group">
      <div class="ghead"><span class="gnum">04</span><span class="eyebrow" data-i18n="g_output"></span></div>
      <div class="field">
        <label class="lbl" data-i18n="color"></label>
        <div class="swatchrow">
          <input id="color" type="color" value="#d0021b">
          <input id="colorHex" type="text" value="#D0021BFF" style="flex:1">
        </div>
        <div class="hint" data-i18n="color_hint"></div>
      </div>
      <div class="row">
        <div class="field">
          <label class="lbl" data-i18n="width"></label>
          <input id="width" type="number" value="10" step="0.5">
        </div>
        <div class="field">
          <label class="lbl" data-i18n="minarea"></label>
          <input id="min_area" type="number" value="8" step="1">
        </div>
      </div>
    </div>

    <details>
      <summary data-i18n="advanced"></summary>
      <div class="details-body">
        <div class="field">
          <label class="lbl" data-i18n="prev_bg"></label>
          <div class="swatchrow">
            <input id="bg" type="color" value="#000000">
            <input id="bgHex" type="text" value="#000000FF" style="flex:1">
          </div>
        </div>
        <div class="row">
          <div class="field">
            <label class="lbl" data-i18n="min_tri"></label>
            <input id="min_triangle_area" type="number" value="0.000002" step="0.000001">
          </div>
          <div class="field">
            <label class="lbl" data-i18n="winding"></label>
            <select id="triangle_winding">
              <option value="positive">positive</option>
              <option value="negative">negative</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label class="lbl" data-i18n="trace_mode"></label>
          <select id="trace_mode">
            <option value="polygon" data-i18n="polygon"></option>
            <option value="rectangle-first" data-i18n="rectfirst"></option>
          </select>
        </div>
        <div class="row">
          <div class="field">
            <label class="lbl" data-i18n="trace_src"></label>
            <select id="trace_source">
              <option value="boundary" data-i18n="boundary"></option>
              <option value="centerline" data-i18n="centerline"></option>
            </select>
          </div>
          <div class="field">
            <label class="lbl" data-i18n="stroke_w"></label>
            <input id="trace_width_px" type="number" data-i18n-ph="auto" step="0.5">
          </div>
        </div>
        <div class="field">
          <label class="lbl" style="text-transform:none;letter-spacing:0;font-family:var(--body)">
            <span><input type="checkbox" id="border_cylinders"><span data-i18n="border_cyl"></span></span></label>
        </div>
        <div class="field">
          <label class="lbl" data-i18n="border_circle"></label>
          <input id="border_circle" type="text" data-i18n-ph="autodetect">
        </div>
        <div class="row">
          <div class="field">
            <label class="lbl" data-i18n="border_in"></label>
            <input id="border_inner_color" type="text" value="#000000FF">
          </div>
          <div class="field">
            <label class="lbl" data-i18n="border_out"></label>
            <input id="border_outer_color" type="text" data-i18n-ph="eqfill">
          </div>
        </div>
        <div class="field">
          <label class="lbl" data-i18n="extra"></label>
          <input id="extra_args" type="text" placeholder="--bridge-rect ...">
          <div class="hint" data-i18n="extra_hint"></div>
        </div>
      </div>
    </details>

    <div class="go-wrap">
      <button id="go" class="go" disabled><span class="arrow">▶</span><span data-i18n="convert"></span></button>
      <div class="go-hint" id="goHint" data-i18n="hint_idle"></div>
    </div>
  </div>

  <!-- ============ VIEWPORT ============ -->
  <div class="stage" id="stage">
    <div class="frame empty" id="frame">
      <span class="reg tl"></span><span class="reg tr"></span><span class="reg bl"></span><span class="reg br"></span>
      <div class="scanline"></div>
      <div class="empty-note" data-i18n="empty" id="emptyNote"></div>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

/* ================= i18n ================= */
const I18N = {
  zh:{
    tag:"纹章 → 原版 MER 图纸（BlockType 0/1，无需魔改）",
    st_ready:"就绪", st_work:"生成中", st_done:"完成", st_err:"错误",
    g_source:"来源", drop:"点击或拖入图片（PNG / JPG / WEBP）",
    name:"图纸名称", name_ph:"取自文件名",
    g_trace:"描摹", trace_desc:"把哪些像素变成纹章", light:"亮部", dark:"暗部", threshold:"阈值",
    g_fill:"填充", ngon:"N 边形 · 更省", triangle:"逐三角形",
    detail:"细节 · 简化", detail_hint:"越低越还原、体量越大；越高越平滑、越省。",
    g_output:"输出", color:"纹章颜色", color_hint:"线条留空，透出墙面。",
    width:"宽度 · 单位", minarea:"最小面积 · px",
    advanced:"高级选项", prev_bg:"预览背景", min_tri:"最小三角面积", winding:"绕序",
    trace_mode:"描摹方式", polygon:"多边形 · 填充", rectfirst:"矩形优先 · 描边",
    trace_src:"描摹源", boundary:"轮廓", centerline:"中线", stroke_w:"描边宽度 · px", auto:"自动",
    border_cyl:"圆环边框 → 2 个圆柱", border_circle:"边框圆 · cx,cy,外径,内径 px", autodetect:"留空则自动检测",
    border_in:"边框内色", border_out:"边框外色", eqfill:"同纹章",
    extra:"附加命令行参数 · 进阶", extra_hint:"直接传给 png_to_mer_schematic.py。",
    convert:"生成图纸", hint_idle:"选择图片后开始。", hint_ready:"已就绪。", hint_work:"生成中…",
    empty:"上传纹章并生成 · 得到实时预览、对象数量与可下载图纸",
    r_objects:"运行时对象 · BLOCKTYPE 0 + 1", r_folder:"图纸文件夹",
    download:"下载", deploy:n=>`解压到 LabAPI-beta/configs/ProjectMER/Schematics/ · 得到 ${n}/${n}.json`,
    fail:"生成失败", reqfail:"请求失败"
  },
  en:{
    tag:"emblem → vanilla MER schematic (BlockType 0/1, no fork)",
    st_ready:"Ready", st_work:"Working", st_done:"Done", st_err:"Error",
    g_source:"Source", drop:"Click or drop an image (PNG / JPG / WEBP)",
    name:"Schematic name", name_ph:"from filename",
    g_trace:"Trace", trace_desc:"which pixels become the emblem", light:"Light", dark:"Dark", threshold:"Threshold",
    g_fill:"Fill", ngon:"N-gon · fewer", triangle:"Per-triangle",
    detail:"Detail · simplify", detail_hint:"Lower = more faithful & heavier; higher = smoother & cheaper.",
    g_output:"Output", color:"Fill colour", color_hint:"Linework stays as gaps — the wall shows through.",
    width:"Width · units", minarea:"Min area · px",
    advanced:"Advanced options", prev_bg:"Preview background", min_tri:"Min triangle area", winding:"Winding",
    trace_mode:"Trace mode", polygon:"polygon · fill", rectfirst:"rectangle-first · strokes",
    trace_src:"Trace source", boundary:"boundary", centerline:"centerline", stroke_w:"Stroke width · px", auto:"auto",
    border_cyl:"Border → 2 cylinders", border_circle:"Border circle · cx,cy,outerD,innerD px", autodetect:"auto-detect if blank",
    border_in:"Border inner colour", border_out:"Border outer colour", eqfill:"= fill",
    extra:"Extra CLI args · power users", extra_hint:"Passed straight to png_to_mer_schematic.py.",
    convert:"Convert", hint_idle:"Choose an image to begin.", hint_ready:"Ready.", hint_work:"Converting…",
    empty:"Upload an emblem and convert — live preview, object count, downloadable folder",
    r_objects:"RUNTIME OBJECTS · BLOCKTYPE 0 + 1", r_folder:"SCHEMATIC FOLDER",
    download:"Download", deploy:n=>`Unzip into LabAPI-beta/configs/ProjectMER/Schematics/ — gives ${n}/${n}.json`,
    fail:"conversion failed", reqfail:"Request failed"
  }
};
let LANG = localStorage.getItem("merbench_lang") || "zh";
function t(k){ return (I18N[LANG] && I18N[LANG][k]) ?? (I18N.en[k]); }
function applyLang(){
  document.documentElement.lang = LANG==="zh" ? "zh" : "en";
  document.querySelectorAll("[data-i18n]").forEach(el=>{ const v=t(el.dataset.i18n); if(typeof v==="string") el.textContent=v; });
  document.querySelectorAll("[data-i18n-ph]").forEach(el=>{ const v=t(el.dataset.i18nPh); if(typeof v==="string") el.placeholder=v; });
  $("lang").querySelectorAll("button").forEach(b=>b.classList.toggle("on", b.dataset.l===LANG));
  setStatus(currentStatus);
  $("goHint").textContent = fileData ? t("hint_ready") : t("hint_idle");
  if(lastResult) renderResult(lastResult);      // re-render result strip in new language
}
$("lang").addEventListener("click",e=>{
  if(e.target.tagName!=="BUTTON") return;
  LANG=e.target.dataset.l; localStorage.setItem("merbench_lang",LANG); applyLang();
});

/* ================= status ================= */
let currentStatus="idle";
const ST={idle:"st_ready",ready:"st_ready",work:"st_work",done:"st_done",err:"st_err"};
function setStatus(s){ currentStatus=s; const el=$("status");
  el.dataset.s = (s==="work")?"work":(s==="err")?"err":"idle";
  $("statusText").textContent = t(ST[s]||"st_ready");
}

/* ================= file input ================= */
let fileData=null, fileName="", lastResult=null;
const drop=$("drop"), fileInput=$("file");
drop.addEventListener("click",()=>fileInput.click());
drop.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault();fileInput.click();} });
drop.addEventListener("dragover",e=>{e.preventDefault();drop.classList.add("hover");});
drop.addEventListener("dragleave",()=>drop.classList.remove("hover"));
drop.addEventListener("drop",e=>{e.preventDefault();drop.classList.remove("hover");
  if(e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]);});
fileInput.addEventListener("change",()=>{ if(fileInput.files.length) loadFile(fileInput.files[0]); });
function loadFile(f){
  fileName=f.name; const r=new FileReader();
  r.onload=()=>{ fileData=r.result; const img=$("srcPreview"); img.src=fileData; img.hidden=false;
    $("dropText").textContent=f.name; $("go").disabled=false; setStatus("ready");
    $("goHint").textContent=t("hint_ready");
    if(!$("name").value) $("name").value=f.name.replace(/\.[^.]+$/,"");
  };
  r.readAsDataURL(f);
}

/* ================= colour sync ================= */
function bindColor(picker,hex,defA="FF"){
  picker.addEventListener("input",()=>{ let a=(hex.value.length===9)?hex.value.slice(7):defA;
    hex.value=(picker.value+a).toUpperCase(); });
  hex.addEventListener("input",()=>{ if(/^#[0-9a-fA-F]{6}/.test(hex.value)) picker.value=hex.value.slice(0,7); });
}
bindColor($("color"),$("colorHex")); bindColor($("bg"),$("bgHex"));

/* ================= segmented toggles ================= */
function seg(id){ const box=$(id);
  box.addEventListener("click",e=>{ if(e.target.tagName!=="BUTTON") return;
    [...box.children].forEach(b=>b.classList.toggle("on",b===e.target)); });
  return ()=>box.querySelector(".on").dataset.v;
}
const getFg=seg("fgSeg"), getFill=seg("fillSeg");
$("threshold").addEventListener("input",e=>$("thrVal").textContent=e.target.value);
$("simplify").addEventListener("input",e=>$("simVal").textContent=e.target.value);

/* ================= convert ================= */
$("go").addEventListener("click",convert);
function num(id){const v=$(id).value;return v===""?undefined:parseFloat(v);}
function txt(id){const v=$(id).value.trim();return v===""?undefined:v;}

async function convert(){
  if(!fileData) return;
  const params={
    name:txt("name"), color:$("colorHex").value.trim(), foreground:getFg(),
    threshold:parseInt($("threshold").value,10), fill_mode:getFill(),
    simplify:parseFloat($("simplify").value), min_area:num("min_area"), width:num("width"),
    preview_bg:$("bgHex").value.trim(), min_triangle_area:num("min_triangle_area"),
    triangle_winding:$("triangle_winding").value, trace_mode:$("trace_mode").value,
    trace_source:$("trace_source").value, trace_width_px:num("trace_width_px"),
    border_cylinders:$("border_cylinders").checked, border_circle:txt("border_circle"),
    border_inner_color:txt("border_inner_color"), border_outer_color:txt("border_outer_color"),
    extra_args:txt("extra_args"),
  };
  if(params.trace_mode==="polygon"){ delete params.trace_source; delete params.trace_width_px; }

  lastResult=null;
  $("stage").innerHTML='<div class="spinner"></div>';
  $("go").disabled=true; setStatus("work"); $("goHint").textContent=t("hint_work");
  try{
    const res=await fetch("/convert",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({filename:fileName,image_b64:fileData,params})});
    const data=await res.json();
    if(data.ok){ lastResult=data; setStatus("done"); } else setStatus("err");
    renderResult(data);
  }catch(err){ setStatus("err");
    $("stage").innerHTML=`<div class="err"><b>${t("reqfail")}</b>${err}</div>`;
  }finally{ $("go").disabled=false; $("goHint").textContent=t("hint_ready"); }
}

function animateCount(el,target){
  if(matchMedia("(prefers-reduced-motion:reduce)").matches){ el.textContent=target.toLocaleString(); return; }
  const dur=650, t0=performance.now();
  (function step(now){ const p=Math.min(1,(now-t0)/dur); const e=1-Math.pow(1-p,3);
    el.textContent=Math.round(target*e).toLocaleString();
    if(p<1) requestAnimationFrame(step); })(t0);
}

function renderResult(d){
  const stage=$("stage");
  if(!d.ok){
    stage.innerHTML=`<div class="err"><b>${t("fail")}</b>${(d.error||"")}</div>`;
    return;
  }
  stage.innerHTML=`
    <div class="frame reveal" id="frame">
      <span class="reg tl"></span><span class="reg tr"></span><span class="reg bl"></span><span class="reg br"></span>
      <div class="scanline"></div>
      <img src="data:image/png;base64,${d.preview}" alt="${d.name}">
    </div>
    <div class="readout">
      <div class="rt-top">
        <div class="rt-count"><b id="countN">0</b><span>${t("r_objects")}</span></div>
        <div class="rt-meta">
          <div class="name">${d.name}<small>${t("r_folder")}</small></div>
          ${d.ngon?`<div class="ngon">${d.ngon}</div>`:""}
        </div>
      </div>
      <div class="rt-bot">
        <a class="dl" href="${d.download}">↓ ${t("download")} ${d.name}.zip</a>
        <span class="deploy">${t("deploy")(d.name)}</span>
      </div>
    </div>`;
  if(d.toys!=null) animateCount($("countN"),d.toys);
}

applyLang();
</script>
</body>
</html>
